<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Global Footprint</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000d25;
      color: #ffffff;
      font-family: "Poppins", sans-serif;
      overflow-x: hidden;
    }

    .global-footprint-section {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 70px 20px 70px;
      overflow: hidden;
      color: #ffffff;
      background:
        radial-gradient(circle at 50% 0%, rgba(27, 89, 150, 0.34), transparent 34%),
        radial-gradient(circle at 15% 47%, rgba(28, 118, 124, 0.12), transparent 30%),
        radial-gradient(circle at 85% 52%, rgba(22, 85, 150, 0.12), transparent 30%),
        #000d25;
    }

    .global-footprint-container {
      position: relative;
      z-index: 2;
      max-width: 1540px;
      margin: 0 auto;
    }

    .global-footprint-head {
      max-width: 780px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 5;
    }

    .global-footprint-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 9px 16px;
      border-radius: 11px;
      color: #48cf8d;
      background: rgba(7, 31, 69, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.035);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 18px 48px rgba(0, 0, 0, 0.16);
      font-size: 15px;
      line-height: 1;
      font-weight: 400;
    }

    .global-footprint-pill strong {
      color: #62e99f;
      font-weight: 700;
    }

    .pill-icon {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #5bdc94;
      color: #061833;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 0 18px rgba(91, 220, 148, 0.25);
    }

    .global-footprint-head h2 {
      margin: 34px 0 0;
      color: #ffffff;
      font-size: clamp(42px, 4.9vw, 68px);
      line-height: 1.07;
      font-weight: 500;
      letter-spacing: -2.8px;
      text-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
    }

    .global-footprint-head p {
      max-width: 760px;
      margin: 26px auto 0;
      color: rgba(255, 255, 255, 0.62);
      font-size: clamp(17px, 1.6vw, 23px);
      line-height: 1.42;
      font-weight: 400;
      letter-spacing: -0.45px;
    }

    .map-wrap {
      position: relative;
      width: 100%;
      margin-top: 72px;
      overflow: visible;
    }

    .map-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      scrollbar-width: none;
      padding-top: 20px;
    }

    .map-scroll::-webkit-scrollbar {
      display: none;
    }

    #worldMapSvg {
      display: block;
      width: min(100%, 1480px);
      min-width: 1080px;
      height: auto;
      margin: 0 auto;
      overflow: visible;
    }

    .map-dot {
      fill: rgba(91, 200, 142, 0.56);
    }

    .map-dot:nth-child(5n) {
      fill: rgba(91, 200, 142, 0.46);
    }

    .map-dot:nth-child(9n) {
      fill: rgba(91, 200, 142, 0.7);
    }

    .s-marker-outer {
      fill: rgba(0, 13, 37, 0.58);
      filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.42));
    }

    .s-marker {
      fill: #22b95f;
      stroke: rgba(255, 255, 255, 0.1);
      stroke-width: 4;
      filter: drop-shadow(0 0 22px rgba(34, 185, 95, 0.3));
    }

    .s-marker-text {
      fill: #ffffff;
      font-size: 23px;
      font-weight: 500;
      dominant-baseline: middle;
      text-anchor: middle;
    }

    .location-text {
      fill: #ffffff;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.4px;
      paint-order: stroke;
      stroke: rgba(0, 13, 37, 0.7);
      stroke-width: 4px;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.28));
    }

    .plane-icon {
      fill: rgba(255, 255, 255, 0.9);
      filter:
        drop-shadow(0 0 7px rgba(255, 255, 255, 0.75))
        drop-shadow(0 0 14px rgba(255, 255, 255, 0.36));
    }

    .location-glow {
      fill: rgba(255, 255, 255, 0.22);
      filter: blur(8px);
    }

    @media (max-width: 1024px) {
      .global-footprint-section {
        padding: 80px 16px 76px;
      }

      .map-wrap {
        margin-top: 64px;
      }

      #worldMapSvg {
        min-width: 1080px;
      }
    }

    @media (max-width: 768px) {
      .global-footprint-section {
        padding: 72px 14px 70px;
      }

      .global-footprint-head h2 {
        margin-top: 28px;
        font-size: 38px;
        letter-spacing: -1.8px;
      }

      .global-footprint-head p {
        margin-top: 20px;
        font-size: 15.5px;
        line-height: 1.55;
      }

      .map-wrap {
        margin-top: 54px;
      }

      #worldMapSvg {
        min-width: 1040px;
      }
    }
  </style>
</head>

<body>
  <section class="global-footprint-section">
    <div class="global-footprint-container">
      <div class="global-footprint-head">
        <div class="global-footprint-pill">
          <span class="pill-icon">↗</span>
          <span><strong>Global</strong> Presence</span>
        </div>

        <h2>Our Global Footprint</h2>

        <p>
          We connect businesses with top talent across key global regions
          enabling faster hiring and distributed team success.
        </p>
      </div>

      <div class="map-wrap">
        <div class="map-scroll">
          <svg id="worldMapSvg" viewBox="0 0 1400 700" aria-label="Dotted world map"></svg>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <script>
    const svg = d3.select("#worldMapSvg");
    const width = 1400;
    const height = 700;

    const defs = svg.append("defs");

    const whiteGlow = defs
      .append("filter")
      .attr("id", "whiteGlow")
      .attr("x", "-80%")
      .attr("y", "-80%")
      .attr("width", "260%")
      .attr("height", "260%");

    whiteGlow
      .append("feGaussianBlur")
      .attr("stdDeviation", "7")
      .attr("result", "blur");

    const merge = whiteGlow.append("feMerge");
    merge.append("feMergeNode").attr("in", "blur");
    merge.append("feMergeNode").attr("in", "SourceGraphic");

    const mapLayer = svg.append("g").attr("class", "map-layer");
    const markerLayer = svg.append("g").attr("class", "marker-layer");

    const projection = d3
      .geoNaturalEarth1()
      .rotate([0, 0])
      .translate([width / 2, height / 2 + 12])
      .scale(252);

    function addPlaneLabel({ lon, lat, label, dx = 0, dy = 0 }) {
      const point = projection([lon, lat]);
      if (!point) return;

      const x = point[0] + dx;
      const y = point[1] + dy;

      const group = markerLayer
        .append("g")
        .attr("transform", `translate(${x}, ${y})`);

      group
        .append("circle")
        .attr("class", "location-glow")
        .attr("cx", 10)
        .attr("cy", 0)
        .attr("r", 24);

      group
        .append("path")
        .attr("class", "plane-icon")
        .attr(
          "d",
          "M-13,-5 L18,-17 L6,-1 L18,15 L-13,5 L-26,16 L-18,0 L-26,-16 Z"
        )
        .attr("transform", "rotate(-18) scale(0.7)");

      group
        .append("text")
        .attr("class", "location-text")
        .attr("x", 30)
        .attr("y", 6)
        .text(label);
    }

    function addSMarker({ lon, lat, label, showLabel = false, dx = 0, dy = 0 }) {
      const point = projection([lon, lat]);
      if (!point) return;

      const x = point[0] + dx;
      const y = point[1] + dy;

      const group = markerLayer
        .append("g")
        .attr("transform", `translate(${x}, ${y})`);

      group
        .append("circle")
        .attr("class", "s-marker-outer")
        .attr("r", 31);

      group
        .append("circle")
        .attr("class", "s-marker")
        .attr("r", 23);

      group
        .append("text")
        .attr("class", "s-marker-text")
        .attr("x", 0)
        .attr("y", 2)
        .text("S");

      if (showLabel) {
        const labelGroup = group
          .append("g")
          .attr("transform", "translate(-34, 38)");

        labelGroup
          .append("circle")
          .attr("class", "location-glow")
          .attr("cx", 0)
          .attr("cy", 0)
          .attr("r", 22);

        labelGroup
          .append("path")
          .attr("class", "plane-icon")
          .attr(
            "d",
            "M-13,-5 L18,-17 L6,-1 L18,15 L-13,5 L-26,16 L-18,0 L-26,-16 Z"
          )
          .attr("transform", "rotate(-18) scale(0.62)");

        labelGroup
          .append("text")
          .attr("class", "location-text")
          .attr("x", 22)
          .attr("y", 6)
          .attr("font-size", 15)
          .text(label);
      }
    }

    function drawDots(land) {
      const dots = [];

      for (let x = 40; x <= width - 40; x += 10.5) {
        for (let y = 12; y <= height - 34; y += 10.5) {
          const coordinate = projection.invert([x, y]);

          if (!coordinate) continue;

          const lon = coordinate[0];
          const lat = coordinate[1];

          if (lat < -58 || lat > 86) continue;

          if (d3.geoContains(land, [lon, lat])) {
            dots.push({ x, y });
          }
        }
      }

      mapLayer
        .selectAll("circle")
        .data(dots)
        .enter()
        .append("circle")
        .attr("class", "map-dot")
        .attr("cx", d => d.x)
        .attr("cy", d => d.y)
        .attr("r", 3.15);
    }

    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json")
      .then(response => response.json())
      .then(world => {
        const land = topojson.feature(world, world.objects.land);

        drawDots(land);

        addSMarker({
          lon: -101,
          lat: 55,
          showLabel: false,
          dx: -8,
          dy: -2
        });

        addSMarker({
          lon: -100,
          lat: 38,
          label: "US",
          showLabel: true,
          dx: -16,
          dy: 4
        });

        addPlaneLabel({
          lon: 54.3,
          lat: 24.4,
          label: "UAE",
          dx: -10,
          dy: -4
        });

        addPlaneLabel({
          lon: 45.0,
          lat: 23.8,
          label: "Saudi Arabia",
          dx: -16,
          dy: 34
        });

        addPlaneLabel({
          lon: 69.3,
          lat: 30.3,
          label: "Pakistan",
          dx: -8,
          dy: 10
        });
      })
      .catch(error => {
        console.error("Map data could not load:", error);
      });
  </script>
</body>
</html>
